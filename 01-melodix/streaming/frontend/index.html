<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>melodix</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/static/manifest.json">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 11.5 Q6 4 8 8 Q10 12 14 4.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div>
        <div class="logo-name">melodix</div>
        <div class="logo-tag">01</div>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-section-label">Library</div>
      <a class="nav-item active" data-view="all" href="#">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M2 4h12M2 8h12M2 12h8"/>
        </svg>
        All songs
      </a>
      <a class="nav-item" data-view="favourites" href="#">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 13s-6-3.5-6-7.5A3.5 3.5 0 018 4a3.5 3.5 0 016 1.5C14 9.5 8 13 8 13z"/>
        </svg>
        Favourites
      </a>
      <a class="nav-item" data-view="recent" href="#">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="8" cy="8" r="6"/><path d="M8 5v3.5l2.5 1.5"/>
        </svg>
        Recent
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="storage-label">Storage</div>
      <div class="storage-bar"><div class="storage-fill" id="storageFill"></div></div>
      <div class="storage-text" id="storageText">— songs</div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">

    <!-- Top bar: add song -->
    <header class="topbar">
      <div class="add-bar">
        <div class="url-input-wrap">
          <svg class="url-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M6.5 9.5a3.536 3.536 0 005 0l2-2a3.536 3.536 0 00-5-5l-1 1"/>
            <path d="M9.5 6.5a3.536 3.536 0 00-5 0l-2 2a3.536 3.536 0 005 5l1-1"/>
          </svg>
          <input type="url" id="urlInput" class="url-input" placeholder="Paste YouTube URL…" autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
        <button class="add-btn" id="addBtn" onclick="addSong()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M7 2v10M2 7h10"/>
          </svg>
          Add song
        </button>
      </div>
      <div class="toast-area" id="toastArea"></div>
    </header>

    <!-- Song list -->
    <div class="song-list-wrap">
      <div class="song-list-header">
        <span class="col-num">#</span>
        <span class="col-title">Title</span>
        <span class="col-dur">Duration</span>
        <span class="col-act"></span>
      </div>

      <div id="songList" class="song-list">
        <div class="empty-state" id="emptyState">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
            <path d="M20 28C26 28 32 24 32 16V8l-14 3v14"/>
            <circle cx="14" cy="26" r="4"/><circle cx="28" cy="23" r="4"/>
          </svg>
          <p>Your library is empty</p>
          <span>Paste a YouTube link above to get started</span>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Player bar -->
<footer class="player" id="player">
  <div class="player-left">
    <div class="player-thumb" id="playerThumb"></div>
    <div class="player-meta">
      <div class="player-title" id="playerTitle">—</div>
      <div class="player-artist" id="playerArtist">—</div>
    </div>
  </div>

  <div class="player-center">
    <div class="player-controls">
      <button class="ctrl-btn" id="prevBtn" onclick="playPrev()" title="Previous">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 3h1.5v10H3zm9.5 0L6 8l6.5 5z"/></svg>
      </button>
      <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()" title="Play / Pause">
        <svg id="playIcon" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3l9 5-9 5z"/></svg>
        <svg id="pauseIcon" viewBox="0 0 16 16" fill="currentColor" style="display:none"><path d="M4 3h2.5v10H4zm5.5 0H12v10H9.5z"/></svg>
      </button>
      <button class="ctrl-btn" id="nextBtn" onclick="playNext()" title="Next">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 3H13v10h-1.5zm-8.5 0L9.5 8 3 13z"/></svg>
      </button>
    </div>

    <div class="progress-row">
      <span class="time-label" id="currentTime">0:00</span>
      <div class="progress-bar" id="progressBar" onclick="seekTo(event)">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-thumb" id="progressThumb"></div>
      </div>
      <span class="time-label" id="totalTime">0:00</span>
    </div>
  </div>

  <div class="player-right">
    <button class="ctrl-btn small" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 4h3l7 8h2M14 4l-3.5 3.5M14 12h-2l-1.5-1.5"/>
      </svg>
    </button>
    <div class="volume-wrap">
      <svg class="vol-icon" viewBox="0 0 16 16" fill="currentColor">
        <path d="M3 6H1v4h2l4 3V3L3 6zm7-.5a4 4 0 010 9M8 3a7 7 0 010 10"/>
      </svg>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
    </div>
  </div>
</footer>

<audio id="audioEl" preload="none"></audio>

<script src="/static/app.js"></script>
</body>
</html>
